<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartenn — Saint-Brieuc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --encre:#1B2A3A;      /* encre marine (textes, traits) */
    --papier:#EFE8D8;     /* papier de carte ancienne */
    --papier-fonce:#E4DBC5;
    --ocean:#2E6E8E;      /* bleu hortensia / océan */
    --ocean-clair:#9CC0D0;
    --cidre:#C9922F;      /* doré cidre : accent, avec parcimonie */
    --hermine:#15161B;    /* noir gwenn-ha-du */
    --goemon:#3F7A57;     /* vert goémon : position GPS + pierre */
    --rouge:#B3402E;      /* annotations façon feutre rouge du schéma */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Bricolage Grotesque",system-ui,sans-serif;
    background:var(--papier);
    color:var(--encre);
    overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;z-index:0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(27,42,58,.05), transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(201,146,47,.07), transparent 45%);
  }

  .screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:1;overflow:hidden}
  .screen.active{display:flex;animation:fadein .35s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .bandeau{display:flex;height:10px;flex:none}
  .bandeau span{flex:1}
  .bandeau span:nth-child(odd){background:var(--hermine)}
  .bandeau span:nth-child(even){background:#F6F1E4}

  header.top{display:flex;align-items:center;gap:14px;padding:16px 22px 8px;flex:none}
  .back{
    border:2px solid var(--encre);background:transparent;color:var(--encre);
    font:700 18px "Bricolage Grotesque",sans-serif;
    width:42px;height:42px;border-radius:50%;cursor:pointer;flex:none;
    transition:transform .15s ease, background .15s ease;
  }
  .back:hover{background:var(--encre);color:var(--papier);transform:translateX(-2px)}
  .back:focus-visible{outline:3px solid var(--ocean);outline-offset:2px}
  h1{font-size:clamp(26px,5vw,40px);font-weight:800;letter-spacing:-.02em;line-height:1}
  .sous-titre{font-family:Caveat,cursive;font-size:20px;color:var(--rouge);margin-top:2px}

  /* ===================== ÉCRAN 1 ===================== */
  #home .ciel{position:relative;flex:1;min-height:0}
  .flotteur{
    position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:transparent;border:none;cursor:pointer;
    animation:derive 6s ease-in-out infinite;
    transition:transform .2s ease;
    -webkit-tap-highlight-color:transparent;
    z-index:2;
  }
  .flotteur:hover,.flotteur:focus-visible{transform:scale(1.08) rotate(-2deg)}
  .flotteur:focus-visible{outline:3px dashed var(--ocean);outline-offset:8px;border-radius:16px}
  .flotteur svg{width:clamp(90px,17vw,150px);height:auto;filter:drop-shadow(2px 4px 0 rgba(27,42,58,.12))}
  .etiquette{
    font-family:Caveat,cursive;font-size:clamp(20px,3.4vw,27px);font-weight:700;color:var(--rouge);
    transform:rotate(-3deg);
  }
  .etiquette small{display:block;font-family:"Bricolage Grotesque",sans-serif;font-weight:600;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--encre);opacity:.65;transform:none}
  @keyframes derive{
    0%,100%{translate:0 0}
    25%{translate:6px -10px}
    50%{translate:-4px -16px}
    75%{translate:-8px -6px}
  }
  .flotteur:nth-child(1){animation-duration:7s}
  .flotteur:nth-child(2){animation-duration:5.5s;animation-delay:-2s}
  .flotteur:nth-child(3){animation-duration:6.5s;animation-delay:-4s}
  .flotteur:nth-child(4){animation-duration:8s;animation-delay:-1s}

  .hermine-fond{position:absolute;opacity:.12;user-select:none;pointer-events:none;z-index:0;
    animation:derive 9s ease-in-out infinite}
  .hermine-fond svg{width:26px;height:auto;display:block}

  #home footer{
    flex:none;padding:10px 22px 16px;display:flex;justify-content:space-between;align-items:center;
    font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;
  }

  /* ===================== ÉCRAN 2 ===================== */
  #liste .items{flex:1;overflow-y:auto;padding:10px 22px 30px;display:flex;flex-direction:column;gap:12px}
  .carte-item{
    display:flex;align-items:center;gap:16px;text-align:left;
    background:#F6F1E4;border:2px solid var(--encre);border-radius:14px;
    padding:14px 18px;cursor:pointer;
    box-shadow:3px 3px 0 var(--encre);
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:inherit;color:inherit;
  }
  .carte-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--encre)}
  .carte-item:active{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--encre)}
  .carte-item:focus-visible{outline:3px solid var(--ocean);outline-offset:3px}
  .carte-item .pictogramme{font-size:26px;flex:none;width:44px;height:44px;border-radius:10px;
    display:grid;place-items:center;background:var(--papier-fonce);border:1.5px solid var(--encre)}
  .carte-item .infos{flex:1;min-width:0}
  .carte-item .nom{font-weight:800;font-size:18px}
  .carte-item .detail{font-family:Caveat,cursive;font-size:17px;color:var(--ocean)}
  .carte-item .fleche{font-family:Caveat,cursive;font-size:24px;color:var(--rouge);flex:none}

  /* ===================== ÉCRAN 3 : CARTE LEAFLET ===================== */
  #carte .zone-carte{flex:1;min-height:0;position:relative;padding:6px 14px 14px;display:flex}
  #map{
    flex:1;width:100%;height:100%;
    border:3px solid var(--encre);border-radius:18px;
    box-shadow:4px 4px 0 var(--encre);
    background:var(--papier);
    overflow:hidden;
  }
  /* --- Habillage "carte marine" du fond OSM --- */
  /* teinte parchemin/encre sur les tuiles */
  .leaflet-tile-pane{
    filter:sepia(.5) saturate(.55) hue-rotate(-12deg) brightness(1.04) contrast(.92);
  }
  /* voile papier par-dessus les tuiles */
  #map::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:450;
    background:var(--papier);opacity:.18;mix-blend-mode:multiply;
  }
  /* vignettage léger façon vieille carte */
  #map::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:451;
    box-shadow:inset 0 0 90px rgba(27,42,58,.28);border-radius:15px;
  }
  .leaflet-container{font-family:"Bricolage Grotesque",sans-serif}
  .leaflet-control-attribution{
    background:rgba(246,241,228,.85)!important;color:var(--encre)!important;
    font-size:10px!important;border-radius:8px 0 0 0;
  }
  .leaflet-control-attribution a{color:var(--ocean)!important}
  .leaflet-bar a{
    background:#F6F1E4!important;color:var(--encre)!important;
    border-color:var(--encre)!important;font-weight:800;
  }
  .leaflet-bar{border:2px solid var(--encre)!important;border-radius:10px!important;overflow:hidden;
    box-shadow:2px 2px 0 var(--encre)!important}

  /* pin destination + point position (divIcon) */
  .pin-dest svg{overflow:visible}
  .pin-dest .goutte{animation:goutte 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center bottom}
  @keyframes goutte{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .point-gps{position:relative;width:20px;height:20px}
  .point-gps::before{
    content:"";position:absolute;inset:0;border-radius:50%;
    border:3px solid var(--goemon);animation:pulse 1.8s ease-out infinite;
  }
  .point-gps::after{
    content:"";position:absolute;inset:3px;border-radius:50%;
    background:var(--goemon);border:3px solid #F6F1E4;
  }
  @keyframes pulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(3);opacity:0}}

  .etiquette-lieu{
    font-family:Caveat,cursive;font-size:19px;font-weight:700;color:var(--encre);
    background:#F6F1E4;border:2px solid var(--encre);border-radius:10px;
    padding:1px 10px;white-space:nowrap;box-shadow:2px 2px 0 var(--encre);
  }

  /* rose des vents triskell posée sur la carte */
  .rose-vents{
    position:absolute;top:20px;right:26px;z-index:460;pointer-events:none;
    width:88px;height:88px;filter:drop-shadow(2px 2px 0 rgba(27,42,58,.25));
  }

  .legende{
    position:absolute;left:26px;bottom:26px;z-index:460;
    background:#F6F1E4;border:2px solid var(--encre);border-radius:10px;
    padding:8px 12px;font-family:Caveat,cursive;font-size:17px;line-height:1.35;
    box-shadow:3px 3px 0 var(--encre);max-width:min(70vw,320px);
  }
  .legende .pt{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  .btn-gps{
    position:absolute;right:26px;bottom:26px;z-index:460;
    border:2px solid var(--encre);background:var(--goemon);color:#fff;
    font:700 15px "Bricolage Grotesque",sans-serif;
    padding:10px 16px;border-radius:999px;cursor:pointer;
    box-shadow:3px 3px 0 var(--encre);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn-gps:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--encre)}
  .btn-gps:focus-visible{outline:3px solid var(--ocean);outline-offset:3px}

  /* ===================== DRAPEAU BRETON (Gwenn ha Du) ===================== */
  /* Posé dans chaque en-tête, bien visible, avec un léger flottement au vent. */
  .drapeau-wrap{
    margin-left:auto;flex:none;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .drapeau{
    width:80px;height:auto;display:block;
    border:2px solid var(--encre);border-radius:3px;
    box-shadow:3px 3px 0 rgba(27,42,58,.28);
    transform-origin:left center;
    animation:flotte-drapeau 5s ease-in-out infinite;
  }
  @keyframes flotte-drapeau{
    0%,100%{transform:rotate(-1.2deg) skewY(1deg)}
    50%    {transform:rotate(1.2deg)  skewY(-1deg)}
  }
  .drapeau-legende{
    font-family:Caveat,cursive;font-size:15px;font-weight:700;color:var(--rouge);
    line-height:1;letter-spacing:.02em;
  }

  /* grand drapeau : pièce maîtresse au centre du ciel (PC) */
  .drapeau-hero{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    z-index:1;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .drapeau-hero-svg{
    width:min(30vw,340px);height:auto;
    border:3px solid var(--encre);border-radius:5px;
    box-shadow:7px 9px 0 rgba(27,42,58,.20);
    animation:flotte-drapeau 6s ease-in-out infinite;
  }
  .drapeau-hero-legende{
    font-family:Caveat,cursive;font-weight:700;color:var(--rouge);
    font-size:clamp(24px,3vw,34px);transform:rotate(-2deg);
  }

  /* ===================== MOBILE ===================== */
  @media (max-width:640px){
    /* Accueil : on abandonne le positionnement absolu (qui faisait se
       chevaucher les îlots) au profit d'une grille 2×2 bien aérée. */
    #home .ciel{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      align-content:start;justify-items:center;
      gap:24px 8px;
      padding:12px 12px 20px;
      overflow-y:auto;
    }
    #home .flotteur{
      position:static!important;
      left:auto!important;right:auto!important;top:auto!important;bottom:auto!important;
      animation:none!important;
      width:100%;
    }
    /* hero : le drapeau passe en haut, pleine largeur, façon logo d'accueil */
    .drapeau-hero{
      position:static;transform:none;
      grid-column:1 / -1;
      margin:2px 0 10px;
    }
    .drapeau-hero-svg{width:min(64vw,260px)}
    /* on masque le petit drapeau de l'en-tête sur l'accueil (le hero le remplace) */
    #home .drapeau-wrap{display:none}
    #home .flotteur svg{width:clamp(74px,29vw,120px)}
    .etiquette{font-size:clamp(19px,5.4vw,24px)}

    header.top{padding:12px 16px 6px;gap:10px}
    h1{font-size:clamp(22px,6vw,30px)}
    .sous-titre{font-size:17px}
    .drapeau{width:58px}
    .drapeau-legende{font-size:13px}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>

<!-- ============ DÉFINITIONS SVG RÉUTILISABLES ============ -->
<!-- Le drapeau breton (Gwenn ha Du) et la moucheture d'hermine sont
     définis une seule fois ici, puis réutilisés partout via <use>. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <!-- moucheture d'hermine : 3 points + corps à trois pointes -->
    <g id="moucheture" fill="#15161B">
      <circle cx="0"    cy="-2.4" r=".65"/>
      <circle cx="-1.5" cy="-1.5" r=".65"/>
      <circle cx="1.5"  cy="-1.5" r=".65"/>
      <path d="M0,-1 C .8,-.4 1.1,.9 2.1,2 C 1.3,1.7 .8,1.9 .6,2.9
               C .25,2 -.25,2 -.6,2.9 C -.8,1.9 -1.3,1.7 -2.1,2
               C -1.1,.9 -.8,-.4 0,-1 Z"/>
    </g>
    <!-- drapeau breton : 9 bandes (5 noires, 4 blanches) + canton d'hermines -->
    <symbol id="gwenn-ha-du" viewBox="0 0 108 72">
      <rect width="108" height="72" fill="#F6F1E4"/>
      <g fill="#15161B">
        <rect y="0"  width="108" height="8"/>
        <rect y="16" width="108" height="8"/>
        <rect y="32" width="108" height="8"/>
        <rect y="48" width="108" height="8"/>
        <rect y="64" width="108" height="8"/>
      </g>
      <!-- canton (kanton) : fond blanc + 11 hermines -->
      <rect width="40" height="32" fill="#F6F1E4"/>
      <g>
        <use href="#moucheture" transform="translate(6,8) scale(.9)"/>
        <use href="#moucheture" transform="translate(16,8) scale(.9)"/>
        <use href="#moucheture" transform="translate(26,8) scale(.9)"/>
        <use href="#moucheture" transform="translate(36,8) scale(.9)"/>
        <use href="#moucheture" transform="translate(11,16) scale(.9)"/>
        <use href="#moucheture" transform="translate(21,16) scale(.9)"/>
        <use href="#moucheture" transform="translate(31,16) scale(.9)"/>
        <use href="#moucheture" transform="translate(6,24) scale(.9)"/>
        <use href="#moucheture" transform="translate(16,24) scale(.9)"/>
        <use href="#moucheture" transform="translate(26,24) scale(.9)"/>
        <use href="#moucheture" transform="translate(36,24) scale(.9)"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- ============ ÉCRAN 1 : THÈMES ============ -->
<section class="screen active" id="home" aria-label="Choix du thème">
  <div class="bandeau" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header class="top">
    <div>
      <h1>Degemer mat&nbsp;!</h1>
      <div class="sous-titre">→ choisis un thème pour explorer Saint-Brieuc</div>
    </div>
    <div class="drapeau-wrap">
      <svg class="drapeau" viewBox="0 0 108 72" role="img" aria-label="Gwenn ha Du, le drapeau breton"><use href="#gwenn-ha-du"/></svg>
      <span class="drapeau-legende">Breizh</span>
    </div>
  </header>
  <div class="ciel" id="ciel">

    <!-- grand drapeau breton : centre de l'écran sur PC, hero en haut sur mobile -->
    <div class="drapeau-hero" aria-hidden="true">
      <svg class="drapeau-hero-svg" viewBox="0 0 108 72"><use href="#gwenn-ha-du"/></svg>
      <span class="drapeau-hero-legende">Bevet Breizh&nbsp;!</span>
    </div>

    <button class="flotteur" data-theme="food" style="left:8%;top:4%">
      <!-- Coiffe bigoudène : haute tour de dentelle blanche, brides et petit chignon -->
      <svg viewBox="0 0 110 150" aria-hidden="true">
        <g fill="none" stroke="var(--encre)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <!-- la tour de dentelle -->
          <path d="M44 104 L46 22 Q 46 12 55 12 Q 64 12 64 22 L66 104 Z" fill="#F9F5EA"/>
          <!-- motif dentelle : rangées de petites arches et points -->
          <g stroke-width="2" opacity=".65">
            <path d="M47 30 q4 4 8 0 q4 4 8 0"/>
            <path d="M47 46 q4 4 8 0 q4 4 8 0"/>
            <path d="M46 62 q4.5 4 9 0 q4.5 4 9 0"/>
            <path d="M46 78 q4.5 4 9 0 q4.5 4 9 0"/>
            <circle cx="51" cy="38" r="1.4" fill="var(--encre)"/>
            <circle cx="59" cy="38" r="1.4" fill="var(--encre)"/>
            <circle cx="51" cy="54" r="1.4" fill="var(--encre)"/>
            <circle cx="59" cy="54" r="1.4" fill="var(--encre)"/>
            <circle cx="50" cy="70" r="1.4" fill="var(--encre)"/>
            <circle cx="60" cy="70" r="1.4" fill="var(--encre)"/>
            <circle cx="50" cy="86" r="1.4" fill="var(--encre)"/>
            <circle cx="60" cy="86" r="1.4" fill="var(--encre)"/>
          </g>
          <!-- bandeau de base sur la tête -->
          <path d="M38 108 Q 55 98 72 108 L 70 118 Q 55 110 40 118 Z" fill="#F9F5EA"/>
          <!-- chignon et cheveux esquissés -->
          <path d="M40 118 Q 36 126 41 132 M70 118 Q 74 126 69 132" stroke="var(--hermine)" stroke-width="3.5"/>
          <!-- les deux brides (rubans) qui descendent -->
          <path d="M42 116 q -8 14 -4 28" stroke="var(--cidre)" stroke-width="3.5"/>
          <path d="M68 116 q 8 14 4 28" stroke="var(--cidre)" stroke-width="3.5"/>
          <!-- petit vent dans la dentelle -->
          <path d="M30 40 h-12 M30 56 h-8" stroke="var(--ocean)" stroke-width="3"/>
        </g>
      </svg>
      <span class="etiquette">Food<small>crêpes · marchés · cidre</small></span>
    </button>

    <button class="flotteur" data-theme="place" style="right:10%;top:6%">
      <!-- Phare breton -->
      <svg viewBox="0 0 120 130" aria-hidden="true">
        <g fill="none" stroke="var(--encre)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M48 40 L44 108 L76 108 L72 40 Z" fill="#F6F1E4"/>
          <path d="M46 58 L74 58 L75 74 L45 74 Z" fill="var(--rouge)"/>
          <path d="M45 90 L75 90 L76 104 L44 104" fill="var(--rouge)"/>
          <rect x="50" y="26" width="20" height="14" fill="#F2D48A"/>
          <path d="M46 26 h28 M44 40 h32" />
          <path d="M50 20 L60 12 L70 20 Z" fill="var(--encre)"/>
          <path d="M38 30 L22 22 M82 30 L98 22" stroke="var(--cidre)" stroke-width="3"/>
          <path d="M20 112 q10 -8 20 0 q10 8 20 0 q10 -8 20 0 q10 8 20 0" stroke="var(--ocean)" stroke-width="3.5"/>
        </g>
      </svg>
      <span class="etiquette">Lieux<small>patrimoine · baie · panoramas</small></span>
    </button>

    <button class="flotteur" data-theme="shopping" style="left:12%;bottom:14%">
      <!-- Tote bag orné d'une pierre ésotérique (cristal à facettes qui rayonne) -->
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <g fill="none" stroke="var(--encre)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M40 40 q20 -34 40 0" />
          <path d="M28 44 L92 44 L88 104 L32 104 Z" fill="#F6F1E4"/>
          <path d="M28 52 L92 52"/>
          <!-- cristal à facettes -->
          <g stroke-width="3">
            <path d="M60 60 L74 70 L69 90 L51 90 L46 70 Z" fill="var(--goemon)"/>
            <path d="M60 60 L60 90 M46 70 L60 74 L74 70 M51 90 L60 74 L69 90" stroke="#F6F1E4" opacity=".85"/>
          </g>
          <!-- rayonnement mystique -->
          <g stroke="var(--cidre)" stroke-width="3">
            <path d="M60 52 v-6 M42 60 l-5 -4 M78 60 l5 -4 M40 82 h-7 M80 82 h7"/>
          </g>
        </g>
      </svg>
      <span class="etiquette">Shopping<small>artisans · ésotérisme · souvenirs</small></span>
    </button>

    <button class="flotteur" data-theme="activity" style="right:12%;bottom:12%">
      <!-- Bowling (boule + quille), fidèle au schéma -->
      <svg viewBox="0 0 130 110" aria-hidden="true">
        <g fill="none" stroke="var(--encre)" stroke-width="4" stroke-linecap="round">
          <circle cx="52" cy="66" r="30" fill="var(--ocean-clair)"/>
          <circle cx="44" cy="58" r="3.4" fill="var(--encre)"/>
          <circle cx="58" cy="56" r="3.4" fill="var(--encre)"/>
          <circle cx="52" cy="70" r="3.4" fill="var(--encre)"/>
          <path d="M96 22 c-8 0 -8 10 -4 18 c4 8 -2 14 -4 22 c-2 10 4 16 8 16 c4 0 10 -6 8 -16 c-2 -8 -8 -14 -4 -22 c4 -8 4 -18 -4 -18 Z" fill="#F6F1E4"/>
          <path d="M88 44 h16" stroke="var(--rouge)" stroke-width="4.5"/>
          <path d="M12 88 l18 -8 M16 96 l14 -6" stroke="var(--ocean)" stroke-width="3"/>
        </g>
      </svg>
      <span class="etiquette">Activités<small>bowling · ciné · bars</small></span>
    </button>
  </div>
  <footer><span>Kartenn · Sant-Brieg</span><span>prototype v0.3</span></footer>
</section>

<!-- ============ ÉCRAN 2 : LISTE ============ -->
<section class="screen" id="liste" aria-label="Liste des lieux">
  <div class="bandeau" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header class="top">
    <button class="back" data-goto="home" aria-label="Retour aux thèmes">←</button>
    <div>
      <h1 id="liste-titre">…</h1>
      <div class="sous-titre" id="liste-sous">→ touche un lieu pour voir la carte</div>
    </div>
    <div class="drapeau-wrap">
      <svg class="drapeau" viewBox="0 0 108 72" role="img" aria-label="Gwenn ha Du, le drapeau breton"><use href="#gwenn-ha-du"/></svg>
      <span class="drapeau-legende">Breizh</span>
    </div>
  </header>
  <div class="items" id="liste-items"></div>
</section>

<!-- ============ ÉCRAN 3 : CARTE ============ -->
<section class="screen" id="carte" aria-label="Carte">
  <div class="bandeau" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header class="top">
    <button class="back" data-goto="liste" aria-label="Retour à la liste">←</button>
    <div>
      <h1 id="carte-titre">…</h1>
      <div class="sous-titre" id="carte-sous"></div>
    </div>
    <div class="drapeau-wrap">
      <svg class="drapeau" viewBox="0 0 108 72" role="img" aria-label="Gwenn ha Du, le drapeau breton"><use href="#gwenn-ha-du"/></svg>
      <span class="drapeau-legende">Breizh</span>
    </div>
  </header>
  <div class="zone-carte">
    <div id="map"></div>

    <!-- rose des vents triskell, posée sur la carte -->
    <svg class="rose-vents" viewBox="-56 -56 112 112" aria-hidden="true">
      <circle r="44" fill="#F6F1E4" stroke="var(--encre)" stroke-width="2.5"/>
      <circle r="34" fill="none" stroke="var(--encre)" stroke-width="1" opacity=".4"/>
      <g font-family="Bricolage Grotesque,sans-serif" font-size="14" font-weight="800" fill="var(--encre)" text-anchor="middle">
        <text y="-38">N</text><text y="48">S</text><text x="40" y="5">E</text><text x="-40" y="5">O</text>
      </g>
      <g stroke="var(--ocean)" stroke-width="4" fill="none" stroke-linecap="round">
        <path d="M0 0 q16 -5 12 -20"/>
        <path d="M0 0 q16 -5 12 -20" transform="rotate(120)"/>
        <path d="M0 0 q16 -5 12 -20" transform="rotate(240)"/>
      </g>
      <circle r="3" fill="var(--ocean)"/>
    </svg>

    <div class="legende" id="legende">
      <span class="pt" style="background:var(--rouge)"></span>destination<br>
      <span class="pt" style="background:var(--goemon)"></span>ta position (GPS)
    </div>
    <button class="btn-gps" id="btn-gps">📍 Ma position</button>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* =========================================================
   DONNÉES — chargées depuis data/lieux.json (modifiable via
   Pages CMS, sans toucher au code). Si le fichier est
   introuvable (ex : ouverture en local en double-cliquant),
   on utilise la liste de secours ci-dessous.
   ========================================================= */
const META_THEMES = {
  food:     {titre:"Food",      sous:"→ où bien manger (et boire un chouchen)"},
  place:    {titre:"Lieux",     sous:"→ patrimoine & coins à voir"},
  shopping: {titre:"Shopping",  sous:"→ boutiques & artisans"},
  activity: {titre:"Activités", sous:"→ pour sortir ce soir"}
};

const LIEUX_SECOURS = [
  {theme:"food",     nom:"Crêperie du centre",        detail:"galettes au blé noir, vieille ville",  picto:"🥞", lat:48.5142, lng:-2.7651},
  {theme:"food",     nom:"Halles Georges-Brassens",   detail:"marché couvert, produits de la baie",  picto:"🧺", lat:48.5148, lng:-2.7639},
  {theme:"place",    nom:"Cathédrale Saint-Étienne",  detail:"cathédrale-forteresse du XIIIe",       picto:"⛪", lat:48.5139, lng:-2.7647},
  {theme:"place",    nom:"Pointe du Roselier",        detail:"panorama sur la baie (Plérin)",        picto:"🌊", lat:48.5481, lng:-2.7222},
  {theme:"shopping", nom:"Boutique ésotérique",       detail:"pierres, minéraux & encens",           picto:"🔮", lat:48.5137, lng:-2.7643},
  {theme:"activity", nom:"Bowling de Brézillet",      detail:"strike & frites",                      picto:"🎳", lat:48.4987, lng:-2.7539},
  {theme:"activity", nom:"Bars de la vieille ville",  detail:"rue Fardel & alentours",               picto:"🍺", lat:48.5145, lng:-2.7660}
];

let LIEUX = LIEUX_SECOURS;
fetch("data/lieux.json")
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => { if(Array.isArray(data.lieux) && data.lieux.length) LIEUX = data.lieux; })
  .catch(() => console.warn("data/lieux.json introuvable — liste de secours utilisée."));

function itemsDuTheme(theme){ return LIEUX.filter(l => l.theme === theme); }

/* =========================================================
   NAVIGATION
   ========================================================= */
let themeCourant = null, lieuCourant = null, watchId = null;

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id!=="carte" && watchId!==null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
  if(id==="carte" && map){ setTimeout(()=>map.invalidateSize(), 60); }
}
document.querySelectorAll(".back").forEach(b=>b.addEventListener("click",()=>go(b.dataset.goto)));

document.querySelectorAll(".flotteur").forEach(f=>{
  f.addEventListener("click",()=>{
    themeCourant = f.dataset.theme;
    const meta = META_THEMES[themeCourant];
    document.getElementById("liste-titre").textContent = meta.titre;
    document.getElementById("liste-sous").textContent = meta.sous;
    const cont = document.getElementById("liste-items");
    cont.innerHTML = "";
    itemsDuTheme(themeCourant).forEach(it=>{
      const btn = document.createElement("button");
      btn.className = "carte-item";
      btn.innerHTML = `<span class="pictogramme">${it.picto}</span>
        <span class="infos"><span class="nom">${it.nom}</span><br><span class="detail">${it.detail}</span></span>
        <span class="fleche">voir la carte →</span>`;
      btn.addEventListener("click",()=>ouvrirCarte(it));
      cont.appendChild(btn);
    });
    go("liste");
  });
});

/* =========================================================
   CARTE LEAFLET + OSM, habillée façon carte marine
   (teinte parchemin via CSS sur les tuiles)
   ========================================================= */
let map = null, marqueurDest = null, marqueurGPS = null, ligne = null;

const iconeDest = L.divIcon({
  className:"pin-dest",
  iconSize:[46,58], iconAnchor:[23,54],
  html:`<svg viewBox="0 0 46 58" width="46" height="58">
    <g class="goutte">
      <path d="M23 52 C 7 32 11 12 23 12 C 35 12 39 32 23 52 Z"
            fill="var(--rouge)" stroke="var(--encre)" stroke-width="2.5"/>
      <circle cx="23" cy="24" r="6" fill="#F6F1E4" stroke="var(--encre)" stroke-width="2"/>
    </g>
    <ellipse cx="23" cy="53" rx="9" ry="3" fill="rgba(27,42,58,.25)"/>
  </svg>`
});
const iconeGPS = L.divIcon({className:"", iconSize:[20,20], iconAnchor:[10,10],
  html:`<div class="point-gps"></div>`});

function initCarte(){
  map = L.map("map",{zoomControl:true, attributionControl:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
}

function ouvrirCarte(lieu){
  lieuCourant = lieu;
  document.getElementById("carte-titre").textContent = lieu.nom;
  document.getElementById("carte-sous").textContent = "→ " + lieu.detail;
  go("carte");
  if(!map) initCarte();
  setTimeout(()=>{
    map.invalidateSize();
    map.setView([lieu.lat, lieu.lng], 16);
    if(marqueurDest) marqueurDest.remove();
    marqueurDest = L.marker([lieu.lat, lieu.lng], {icon:iconeDest}).addTo(map)
      .bindTooltip(lieu.nom, {permanent:true, direction:"top", offset:[0,-52], className:"etiquette-lieu"});
    if(marqueurGPS){ marqueurGPS.remove(); marqueurGPS=null; }
    if(ligne){ ligne.remove(); ligne=null; }
    majLegende("ta position (GPS)");
  }, 80);
  demanderPosition();
}
document.getElementById("btn-gps").addEventListener("click",demanderPosition);

/* =========================================================
   GÉOLOCALISATION
   ========================================================= */
function demanderPosition(){
  if(!("geolocation" in navigator)){ majLegende("GPS indisponible sur cet appareil"); return; }
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos=>{
    placerPosition(pos.coords.latitude, pos.coords.longitude);
  }, ()=>{
    majLegende("Position refusée ou introuvable — active le GPS 😉");
  }, {enableHighAccuracy:true, maximumAge:10000, timeout:15000});
}

function placerPosition(lat, lng){
  if(!map || !lieuCourant) return;
  const ici = L.latLng(lat,lng), dest = L.latLng(lieuCourant.lat, lieuCourant.lng);
  if(!marqueurGPS){
    marqueurGPS = L.marker(ici,{icon:iconeGPS}).addTo(map);
  } else marqueurGPS.setLatLng(ici);

  /* trait pointillé encre entre toi et la destination */
  if(ligne) ligne.remove();
  ligne = L.polyline([ici,dest],{color:"var(--encre)",weight:2.5,dashArray:"6 8",opacity:.7}).addTo(map);

  /* cadrer les deux points si tu es proche (< 5 km), sinon rester sur le lieu */
  const dist = Math.round(ici.distanceTo(dest));
  if(dist < 5000) map.fitBounds(L.latLngBounds(ici,dest).pad(.25));
  majLegende(`Tu es à ~${formatDist(dist)} de « ${lieuCourant.nom} »`);
}

function formatDist(m){ return m>=1000 ? (m/1000).toFixed(1).replace(".",",")+" km" : m+" m"; }

function majLegende(msg){
  document.getElementById("legende").innerHTML =
    `<span class="pt" style="background:var(--rouge)"></span>destination<br>
     <span class="pt" style="background:var(--goemon)"></span>${msg}`;
}

/* Hermines flottantes en fond de l'accueil */
(function(){
  const ciel = document.getElementById("ciel");
  const pos = [[46,4],[70,30],[30,52],[58,78],[6,78],[88,60]];
  pos.forEach(([x,y],i)=>{
    const s = document.createElement("span");
    s.className = "hermine-fond";
    s.innerHTML = '<svg viewBox="-3.5 -4 7 8" aria-hidden="true"><use href="#moucheture"/></svg>';
    s.style.left = x+"%"; s.style.top = y+"%";
    s.style.animationDelay = (-i*1.3)+"s";
    ciel.appendChild(s);
  });
})();
</script>
</body>
</html>
